name: Docker CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/student-portal:v1 ./backend

      # Step 4: Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/student-portal-frontend:v1 ./frontend

      # Step 5: Push Docker Images
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-portal:v1

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-portal-frontend:v1

      # Step 6: Deploy to Azure VM via SSH (username/password)
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/student-portal:v1
            docker pull ${{ secrets.DOCKER_USERNAME }}/student-portal-frontend:v1
            cd 3-Tier-Web-App # Navigate to the directory containing the docker-compose.yml file
            docker compose down
            docker compose up -d